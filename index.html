    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Sign-up Form</title>
    </head>
    <body>
        <div class="container">
            <div class="left-container">                 
                    <div class="overlay">                           
                    <img src="./src/img/odin-lined.png" alt="Odin Logo">
                    <h1 class="title">Odin</h1></div>
                    <h2 class="credit">Photo by Rafael Peier on Unsplash</h2>
            </div>
            <div class="right-container">
                <h1>Sign-up Form</h1>
                <div class="intro">
                    <h2 class="subtitle">This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.
    Sign up now to get started.

    You know you want to.</h2>
                </div>
                <div class="form-container">
                    <form id="signup-form">
                        <fieldset>
                            <legend>Personal Information</legend>
                        <label for="first-name">First Name:</label>
                        <input type="text" id="first-name" name="first-name" required>

                        <label for="last-name">Last Name:</label>
                        <input type="text" id="last-name" name="last-name" required>

                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>

                        <label for="phone">Phone Number:</label>
                        <input type="tel" id="phone" name="phone" required>

                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" required>
                        <label for="confirm-password">Confirm Password:</label>
                        <input type="password" id="confirm-password" name="confirm-password" required>  
                        </fieldset>
                        <button type="submit">Sign Up</button>
                    </form>
                    <div class="final-action">
                        
                        <h2 class="subtitle">Already have an account? <a href="#">Log in</a></h2>

                    </div>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
    </html>
