    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Sign-up Form</title>
    </head>
    <body>
        <div class="container">
            <div class="left-container">                 
                    <div class="overlay">                           
                    <img src="./src/img/odin-lined.png" alt="Odin Logo">
                    <h1 class="title">ODIN</h1></div>
                    <p class="credit">Photo by Rafael Peier on Unsplash</p>
            </div>
            <div class="right-container">
                <div class="intro">
                    <p class="intro-text">This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.
    Sign up now to get started.

    You know you want to.</p>
                </div>
                <div class="form-container">

                    <h2>Let's do this!</h2>
                    <form id="signup-form">

                
                    
                           <div class="form-field first-name">
                        <label for="first-name">First Name:</label>
                        <input type="text" id="first-name" name="first-name" required>
                            </div>
                            <div class="form-field last-name">
                        <label for="last-name">Last Name:</label>
                        <input type="text" id="last-name" name="last-name" required>
                            </div>
                            <div class="form-field email">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-field phone">
                        <label for="phone">Phone Number:</label>
                        <input type="tel" id="phone" name="phone" required>
                        </div>
                        <div class="form-field password">
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" required>
                        </div>
                        <div class="form-field confirm-password">  
                        <label for="confirm-password">Confirm Password:</label>
                        <input type="password" id="confirm-password" name="confirm-password" required>  
                            </div>
                        <button class="submit-button" type="submit">Sign Up</button>
                    </form>
                    <div class="final-action">
                        
                        <p class="login-text">Already have an account? <a href="#">Log in</a></p>

                    </div>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
    </html>
